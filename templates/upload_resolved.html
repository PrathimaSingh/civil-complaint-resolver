<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Close Complaint</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; }
        .message { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>✅ Upload Resolved Image & Close Complaint</h2>
    
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <p class="message">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post" enctype="multipart/form-data">
        <p><strong>Complaint ID:</strong></p>
        <input type="text" name="complaint_id" placeholder="COMP123ABC" required style="width:250px; padding:8px;"><br><br>
        
        <p><strong>Upload Resolved Image:</strong></p>
        <input type="file" name="file" accept="image/*" required><br><br>
        
        <button type="submit" style="padding:10px 20px; font-size:16px;">Upload & Close Complaint</button>
    </form>
    <br>
    <a href="/">← Back to Home</a>
</body>
</html>
