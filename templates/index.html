<!DOCTYPE html>
<html lang="en">
<head>

        body { font-family: Arial, sans-serif; text-align: center; margin-top: 60px; background: #f8f9fa; }

            display: inline-block;

            border-radius: 8px;
            color: white;

    </style>
</head>
<body>
    <h1>🛠️ Civil Complaint Resolver System</h1>
    <p><strong>Select an action:</strong></p>

    <a href="/analytics" class="btn analytics">📊 View Analytics</a>

</html>
